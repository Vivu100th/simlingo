# @package _global_
defaults:
  - mtid_1k

eval_mode: Dreaming
eval_load_path: simlingo_training/outputs/2026_04_27_10_33_14_simlingo_mtid_1k/checkpoints/last.ckpt
eval_batch_size: 1
eval_num_workers: 0
limit_predict_batches: 2

enable_wandb: false
gpus: 1
precision: bf16-mixed
strategy: auto
name: simlingo_mtid_eval_1k

data_module:
  batch_size: 1
  num_workers: 0
  driving_dataset: null
  dreamer_dataset: null
  qa_dataset: null
  base_dataset:
    img_augmentation: false
    img_shift_augmentation: false
    use_safety_flag: true
    eval_deterministic: true
    eval_seed: 9876
    eval_option_policy: index
    eval_safety_policy: alternate
    eval_prompt_policy: with_navigation
