# Default MTID prototype config.
# Paths are relative to repo root unless absolute.

dataset:
  root: database/simlingo_v2_all
  split_glob: data/simlingo/*/*/*/Town*
  boxes_folder: boxes
  measurements_folder: measurements
  rgb_folder: rgb

output:
  folder_name: mtid_dreamer
  root: mtid/outputs/labels
  overwrite: false
  save_visualizations: false

sampling:
  random_seed: 42
  random_subset_count: -1
  sample_uniform_interval: 1
  max_actor_distance_m: 30.0
  future_horizon_s: 2.5
  carla_fps: 20
  dataset_fps: 4

risk:
  min_ttc_s: 1.5
  ego_safe_distance_m: 2.5
  pedestrian_safe_distance_m: 3.0
  two_wheeler_safe_distance_m: 2.0
  vehicle_safe_distance_m: 3.5

modes:
  motorcycle_cut_in: true
  jaywalker_crossing: true
  two_wheeler_filtering: true
  wrong_way_two_wheeler: true
  lane_less_corridor: true
  dense_gap_yield: true

